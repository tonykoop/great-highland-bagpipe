<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 420" width="1100" height="420" font-family="Helvetica, Arial, sans-serif">
  <rect width="1100" height="420" fill="white" stroke="black"/>
  <text x="36" y="44" font-size="22" font-weight="700">GHB-001 Validation Flow</text>
  <g fill="#f8f8f8" stroke="black" stroke-width="2">
    <rect x="60" y="140" width="160" height="80" rx="8"/>
    <rect x="260" y="140" width="160" height="80" rx="8"/>
    <rect x="460" y="140" width="160" height="80" rx="8"/>
    <rect x="660" y="140" width="160" height="80" rx="8"/>
    <rect x="860" y="140" width="160" height="80" rx="8"/>
  </g>
  <g font-size="15" font-weight="700" text-anchor="middle">
    <text x="140" y="176">Leak Test</text><text x="340" y="176">Pressure Window</text>
    <text x="540" y="176">Drone Tuning</text><text x="740" y="176">Chanter Tuning</text>
    <text x="940" y="176">24h Retest</text>
  </g>
  <g font-size="11" text-anchor="middle" fill="#333">
    <text x="140" y="198">stocks, bag, valve</text><text x="340" y="198">18-25 inH2O</text>
    <text x="540" y="198">A3/A2 against Low A</text><text x="740" y="198">JI scale with tape</text>
    <text x="940" y="198">hemp, moisture, drift</text>
  </g>
  <g stroke="black" stroke-width="2" marker-end="url(#arrow)">
    <line x1="220" y1="180" x2="260" y2="180"/><line x1="420" y1="180" x2="460" y2="180"/>
    <line x1="620" y1="180" x2="660" y2="180"/><line x1="820" y1="180" x2="860" y2="180"/>
  </g>
  <text x="60" y="290" font-size="13">A failure in any box loops back to the subsystem build step. Do not compensate pitch by cutting wood until pressure, leakage, and reed behavior are stable.</text>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="black"/></marker></defs>
