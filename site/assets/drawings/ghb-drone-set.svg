    <circle cx="120" cy="345" r="12"/><circle cx="1030" cy="345" r="12"/>
  </g>
  <g font-size="11" text-anchor="middle">
    <text x="120" y="209">A</text><text x="605" y="209">C</text><text x="120" y="349">A</text><text x="1030" y="349">C</text>
  </g>
